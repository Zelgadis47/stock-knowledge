  var tabNames = {books:'鎵嬪唽',tags:'鏍囩',graph:'鍥捐氨',progress:'杩涘害',annotations:'鏍囨敞',srs:'澶嶄範',settings:'璁剧疆'};
  document.querySelectorAll('.tab').forEach(function(t){
    var label = tabNames[n]||n;
    if(t.textContent.includes(label)) t.classList.add('active');
  });
  if(n==='books') KG_renderBooks(document.getElementById('searchBox').value);
  if(n==='tags') KG_renderTags();
  if(n==='graph') KG_renderGraph();
  if(n==='progress'){KG_renderStatsPanel();KG_renderProgressDetail();KG_renderHistory();}
  if(n==='annotations') KG_renderAnnotations();
  if(n==='srs') KG_renderSRS();
}

function KG_renderBooks(f){
  f = (f||'').toLowerCase();
  var cats = [{k:'classic',l:'馃摃 鎶曡祫缁忓吀'},{k:'youzi',l:'馃敟 娓歌祫瀹炴垬'},{k:'tech',l:'馃搳 閫夎偂路鎶€鏈?},{k:'theory',l:'馃 鎶曡祫鐞嗚'},{k:'tool',l:'馃敡 琛嶇敓宸ュ叿'}];
  var html = '';
  cats.forEach(function(c){
    var items = KG_BOOKS.filter(function(b){ return b.cat===c.k && (!f||b.title.toLowerCase().includes(f)||b.tags.some(function(t){return t.toLowerCase().includes(f);})); });
    if(!items.length) return;
    html += '<div class="section"><div class="section-title">'+c.l+'<span class="count">'+items.length+' 鏈?/span></div><div class="grid">';
    items.forEach(function(b){
      var st = KG.getStatus?KG.getStatus(b.id):null;
      var pct = st==='completed'?100:(st==='reading'?50:0);
      html += '<div class="card" onclick="KG_openModal(\''+b.id+'\')"><div class="card-top"><span class="card-icon">'+b.icon+'</span><div class="card-title">'+b.title+'</div></div><div class="card-tags">'+b.tags.map(function(t){return '<span class="card-tag">'+KG_tag(t)+'</span>';}).join('')+'</div><div class="card-desc">'+b.desc+'</div><div class="card-progress"><div class="card-progress-fill" style="width:'+pct+'%"></div></div><div class="card-bottom"><span>'+(st==='completed'?'鉁?宸插畬鎴?:st==='reading'?'馃摉 闃呰涓?:'鈿?鏈')+'</span><span class="size">'+b.size+'</span></div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('tab-books').innerHTML = html||'<p style="color:var(--text2);text-align:center;padding:40px;">娌℃湁鍖归厤鐨勬墜鍐?/p>';
}

var KG_modalId = null;
function KG_openModal(id){
  KG_modalId = id;
  var b = KG_BOOKS.find(function(x){return x.id===id;});
  if(!b) return;
  var st = KG.getStatus?KG.getStatus(id):null;
  var stats = KG.getStats?KG.getStats(id):{visits:0,totalTimeMs:0};
  var notes = KG.getNotes?KG.getNotes(id):[];
  var isBm = KG.isBookmarked?KG.isBookmarked(id):false;
  var tags = b.tags.map(function(t){return '<span class="modal-tag" onclick="KG_closeModal();document.getElementById(\'searchBox\').value=\''+t+'\';KG_switchTab(\'books\')">'+KG_tag(t)+'</span>';}).join('');
  var notesHtml = notes.length? notes.map(function(n){return '<div style="background:var(--bg3);padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:0.78rem;">'+KG_escapeHtml(n.content)+'<br><span style="color:var(--text2);font-size:0.7rem;">'+KG_formatDate(n.createdAt)+'</span></div>';}).join('') : '';
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-tags">'+tags+'</div><h2>'+b.icon+' '+b.title+'</h2><div class="sub">'+b.desc+' 路 '+b.size+'</div>'+
    '<div class="modal-content"><p>馃憗锔?闃呰 '+stats.visits+' 娆?/p>'+'<p>馃晲 鎬绘椂闀?'+(stats.totalTimeMs?Math.round(stats.totalTimeMs/60000)+'鍒嗛挓':'灏氭湭璁板綍')+'</p>'+'<p>馃摑 '+(st==='completed'?'鉁?宸插畬鎴?:st==='reading'?'馃摉 闃呰涓?:'鈿?鏈')+'</p>'+notesHtml+'</div>'+
    '<div class="modal-actions">'+
    '<a href="'+b.id+'.html" target="_blank" class="btn-green">馃摉 闃呰鍏ㄦ枃</a>'+
    '<button onclick="KG_toggleReadModal()">'+(st==='completed'?'鈫?鏍囪鏈瀹?:'鉁?鏍囪宸插畬鎴?)+'</button>'+
    '<button onclick="KG_showNoteDialog(\''+id+'\')">鉁忥笍 鍐欑瑪璁?/button>'+
    '<button onclick="KG_setBmModal()">'+(isBm?'馃敄 鍙栨秷鏀惰棌':'馃彿锔?鏀惰棌')+'</button></div>';
  document.getElementById('modalOverlay').classList.add('active');
}
function KG_toggleReadModal(){
  if(!KG_modalId) return;
  var s = KG.getStatus(KG_modalId);
  KG.setStatus(KG_modalId, s==='completed'?'reading':'completed');
  KG_openModal(KG_modalId);
  KG_renderBooks(document.getElementById('searchBox').value);
}
function KG_setBmModal(){
  if(!KG_modalId) return;
  KG.toggleBookmark(KG_modalId);
  KG_openModal(KG_modalId);
}
function KG_closeModal(){ document.getElementById('modalOverlay').classList.remove('active'); KG_modalId=null; }

function KG_doSearch(){ KG_renderBooks(document.getElementById('searchBox').value); }

function KG_renderTags(){
  var set = new Set();
  KG_BOOKS.forEach(function(b){ b.tags.forEach(function(t){set.add(t);}); });
  var all = Array.from(set).sort();
  if(KG.setTags) KG.setTags('__master__', all);
  var html = '<div class="stat-cards"><div class="stat-card"><div class="num">'+all.length+'</div><div class="lbl">鎬绘爣绛?/div></div></div><div style="display:flex;flex-wrap:wrap;gap:6px;">';
  all.forEach(function(tag){
    var cnt = KG_BOOKS.filter(function(b){return b.tags.includes(tag);}).length;
    html += '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;" onclick="document.getElementById(\'searchBox\').value=\''+tag+'\';KG_switchTab(\'books\')">'+
      '<div style="font-weight:600;font-size:0.85rem;">'+KG_tag(tag)+'</div><div style="font-size:0.7rem;color:var(--text2);">'+cnt+' 椤?/div></div>';
  });
  document.getElementById('tab-tags').innerHTML = html+'</div>';
}

function KG_renderGraph(){
  var nodes=[], links=[], edgeSet=new Set();
  KG_BOOKS.forEach(function(b){
    var sz = 15+((KG.getStats?KG.getStats(b.id).visits:0)||0)*3;
    var st = KG.getStatus?KG.getStatus(b.id):null;
    var cl = st==='completed'?'#3fb950':st==='reading'?'#d29922':'#58a6ff';
    nodes.push({id:b.id,name:b.title,symbolSize:Math.min(sz,40),itemStyle:{color:cl}});
    b.tags.forEach(function(t){
      var tid='tag_'+t;
      if(!nodes.find(function(n){return n.id===tid;})) nodes.push({id:tid,name:t,symbolSize:8,itemStyle:{color:'#8b949e'}});
      var key=b.id+'_'+tid;
      if(!edgeSet.has(key)){ edgeSet.add(key); links.push({source:b.id,target:tid,lineStyle:{color:'#30363d',width:1}}); }
    });
  });
  var dom=document.getElementById('kgraph');
  if(!dom) return;
  var chart=echarts.init(dom);
  chart.setOption({
    tooltip:{trigger:'item',formatter:function(p){if(p.dataType==='node') return'<b>'+p.name+'</b>';}},
    series:[{
      type:'graph',layout:'force',roam:true,draggable:true,
      data:nodes, links:links,
      force:{repulsion:400,edgeLength:120,friction:0.1},
      label:{show:true,position:'right',fontSize:10,color:'#e6edf3',formatter:function(p){return p.name.length>6?p.name.slice(0,6)+'...':p.name;}},
      emphasis:{focus:'adjacency',lineStyle:{width:2}},
      lineStyle:{color:'#30363d',curveness:0.3,opacity:0.5}
    }]
  });
  chart.on('click', function(p){ if(p.dataType==='node' && !p.id.startsWith('tag_')) KG_openModal(p.id); });
}

function KG_renderStatsPanel(){
  var p = KG.getProgress?KG.getProgress():{};
  var ps = KG.getProgressStats?KG.getProgressStats():{reading:0,done:0,total:0};
  var ns = KG.getAllNotes?KG.getAllNotes():{count:0};
  var as = KG.getAllAnnotations?KG.getAllAnnotations():{count:0};
  var ss = KG.getSRSStats?KG.getSRSStats():{due:0};
  document.getElementById('progressStats').innerHTML =
    '<div class="stat-card"><div class="num">'+KG_BOOKS.length+'</div><div class="lbl">鎬绘墜鍐?/div></div>'+
    '<div class="stat-card"><div class="num">'+ps.done+'</div><div class="lbl">宸插畬鎴?/div></div>'+
    '<div class="stat-card"><div class="num">'+ps.reading+'</div><div class="lbl">闃呰涓?/div></div>'+
    '<div class="stat-card"><div class="num">'+(KG_BOOKS.length-ps.done-ps.reading)+'</div><div class="lbl">鏈紑濮?/div></div>'+
    '<div class="stat-card"><div class="num">'+ns.count+'</div><div class="lbl">绗旇</div></div>'+
    '<div class="stat-card"><div class="num">'+as.count+'</div><div class="lbl">鏍囨敞</div></div>'+
    '<div class="stat-card"><div class="num">'+ss.due+'</div><div class="lbl">寰呭涔?/div></div>';
  document.getElementById('statBooks').textContent = KG_BOOKS.length;
  document.getElementById('statNotes').textContent = ns.count;
  document.getElementById('statAnno').textContent = as.count;
  document.getElementById('statSRS').textContent = ss.due;
}
function KG_renderProgressDetail(){
  var html = '<h4 style="font-size:0.9rem;margin-bottom:8px;">馃摉 鍚勬墜鍐岃繘搴?/h4>';
  KG_BOOKS.forEach(function(b){
    var st = KG.getStatus?KG.getStatus(b.id):null;
    var pct = st==='completed'?100:(st==='reading'?50:0);
    var icon = st==='completed'?'鉁?:st==='reading'?'馃摉':'鈿?;
    html += '<div class="prog-item"><span>'+b.icon+'</span><span style="flex:1;font-size:0.82rem;">'+b.title+'</span><div class="prog-bar-outer"><div class="prog-bar-inner" style="width:'+pct+'%"></div></div><span class="prog-pct">'+pct+'%</span><span>'+icon+'</span></div>';
  });
  document.getElementById('progressDetail').innerHTML = html;
}
function KG_renderHistory(){
  var h = KG.getHistory?KG.getHistory(20):[];
  var html = h.map(function(item){ return '<div class="hist-item"><span>'+KG_escapeHtml(item.title)+'</span><span class="time">'+KG_timeAgo(item.timestamp)+'</span></div>'; }).join('');
  document.getElementById('recentHistory').innerHTML = html||'<p style="color:var(--text2);font-size:0.8rem;">杩樻病鏈夋祻瑙堣褰?/p>';
}
function KG_renderAnnotations(){
  var all = KG.getAllAnnotations?KG.getAllAnnotations():{items:{},count:0};
  var html = '';
  Object.keys(all.items).forEach(function(id){
    var book = KG_BOOKS.find(function(b){return b.id===id;});
    var title = book?book.icon+' '+book.title:id;
    all.items[id].forEach(function(a,i){
      html += '<div class="anno-item"><div class="q">"'+KG_escapeHtml(a.text)+'"</div><div class="meta"><span>馃摌 '+title+'</span><button onclick="KG.deleteAnnotation(\''+id+'\','+i+');KG_renderAnnotations();" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:0.7rem;">鍒犻櫎</button></div></div>';
    });
  });
  document.getElementById('annotationsList').innerHTML = html||'<p style="color:var(--text2);text-align:center;padding:20px;">杩樻病鏈夋爣娉?/p>';
}
function KG_renderSRS(){
  var ss = KG.getSRSStats?KG.getSRSStats():{total:0,due:0,upcoming:0};
  document.getElementById('srsStats').innerHTML = '<div class="stat-cards"><div class="stat-card"><div class="num">'+ss.total+'</div><div class="lbl">宸插姞鍏ュ涔?/div></div><div class="stat-card"><div class="num">'+ss.due+'</div><div class="lbl">寰呭涔?馃敶</div></div></div>';
  var due = KG.getDueItems?KG.getDueItems():[];
  var html = '';
  if(ss.due>0){
    html += '<h4 style="font-size:0.9rem;margin-bottom:8px;">馃敶 鍒版湡澶嶄範</h4>';
    due.forEach(function(id){
      var book = KG_BOOKS.find(function(b){return b.id===id;});
      if(!book) return;
      html += '<div class="prog-item"><span>'+book.icon+'</span><span style="flex:1;">'+book.title+'</span><button onclick="KG.recordReview(\''+id+'\');KG_renderSRS();KG_checkSRS();" style="padding:4px 10px;border-radius:6px;border:none;background:#238636;color:white;cursor:pointer;font-size:0.75rem;">鉁?浠婃棩宸插涔?/button></div>';
    });
  }
  var allSRS = JSON.parse(localStorage.getItem('kg_srs_v3')||'{}');
  var upcoming = Object.keys(allSRS).filter(function(id){ return !due.includes(id); });
  if(upcoming.length>0){
    html += '<h4 style="font-size:0.9rem;margin:12px 0 8px;">馃煝 宸叉帓鏈?/h4>';
    upcoming.forEach(function(id){
      var book = KG_BOOKS.find(function(b){return b.id===id;});
      if(!book) return;
      var next = KG.getNextReview?KG.getNextReview(id):null;
      html += '<div class="prog-item"><span>'+book.icon+'</span><span style="flex:1;">'+book.title+'</span><span style="font-size:0.75rem;color:var(--text2);">涓嬫: '+KG_timeAgo(next)+'</span></div>';
    });
  }
  document.getElementById('srsList').innerHTML = html||'<p style="color:var(--text2);text-align:center;padding:20px;">杩樻病鏈夊姞鍏ュ涔犺鍒?/p>';
}
function KG_checkSRS(){
  if(!KG.getDueItems) return;
  var due = KG.getDueItems();
  var bar = document.getElementById('srsReminder');
  if(due.length>0){ bar.style.display='flex'; document.getElementById('srsText').textContent = '馃敶 '+due.length+' 鏈功绫嶅埌鏈熼渶瑕佸涔?; }
  else { bar.style.display='none'; }
}
function KG_importBackup(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{ KG.importAll(JSON.parse(ev.target.result)); alert('鉁?瀵煎叆鎴愬姛锛?); KG_renderStatsPanel(); KG_checkSRS(); }
    catch(err){ alert('鉂?瀵煎叆澶辫触锛氭枃浠舵牸寮忎笉姝ｇ‘'); }
  };
  reader.readAsText(file);
}

window.onload = function(){
  KG_renderBooks('');
  KG_renderStatsPanel();
  KG_checkSRS();
  if(KG.logVisitHistory) KG.logVisitHistory('__home__', '鐭ヨ瘑搴撻椤?);
};
