function KG_tag(t){ return (KG_emojiForTag[t]||'#')+' '+t; }

function KG_switchTab(n){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  var tc = document.getElementById('tab-'+n);
  if(tc) tc.classList.add('active');
  var tabNames = {books:'鎵嬪唽',tags:'鏍囩',graph:'鍥捐氨',progress:'杩涘害',annotations:'鏍囨敞',srs:'澶嶄範',settings:'璁剧疆'};
  document.querySelectorAll('.tab').forEach(function(t){
    var label = tabNames[n]||n;
    if(t.textContent.includes(label)) t.classList.add('active');
  });
  if(n==='books') KG_renderBooks(document.getElementById('searchBox').value);
  if(n==='tags') KG_renderTags();
  if(n==='graph') KG_renderGraph();
  if(n==='progress'){KG_renderStatsPanel();KG_renderProgressDetail();KG_renderHistory();}
  if(n==='annotations') KG_renderAnnotations();
  if(n==='srs') KG_renderSRS();
}

function KG_renderBooks(f){
  f = (f||'').toLowerCase();
  var cats = [{k:'classic',l:'馃摃 鎶曡祫缁忓吀'},{k:'youzi',l:'馃敟 娓歌祫瀹炴垬'},{k:'tech',l:'馃搳 閫夎偂路鎶€鏈?},{k:'theory',l:'馃 鎶曡祫鐞嗚'},{k:'tool',l:'馃敡 琛嶇敓宸ュ叿'}];
  var html = '';
  cats.forEach(function(c){
    var items = KG_BOOKS.filter(function(b){ return b.cat===c.k && (!f||b.title.toLowerCase().includes(f)||b.tags.some(function(t){return t.toLowerCase().includes(f);})); });
    if(!items.length) return;
    html += '<div class="section"><div class="section-title">'+c.l+'<span class="count">'+items.length+' 鏈?/span></div><div class="grid">';
    items.forEach(function(b){
      var st = KG.getStatus?KG.getStatus(b.id):null;
      var pct = st==='completed'?100:(st==='reading'?50:0);
      html += '<div class="card" onclick="KG_openModal(\''+b.id+'\')"><div class="card-top"><span class="card-icon">'+b.icon+'</span><div class="card-title">'+b.title+'</div></div><div class="card-tags">'+b.tags.map(function(t){return '<span class="card-tag">'+KG_tag(t)+'</span>';}).join('')+'</div><div class="card-desc">'+b.desc+'</div><div class="card-progress"><div class="card-progress-fill" style="width:'+pct+'%"></div></div><div class="card-bottom"><span>'+(st==='completed'?'鉁?宸插畬鎴?:st==='reading'?'馃摉 闃呰涓?:'鈿?鏈')+'</span><span class="size">'+b.size+'</span></div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('tab-books').innerHTML = html||'<p style="color:var(--text2);text-align:center;padding:40px;">娌℃湁鍖归厤鐨勬墜鍐?/p>';
}

    '<div class="modal-actions">'+
    '<a href="'+b.id+'.html" target="_blank" class="btn-green">馃摉 闃呰鍏ㄦ枃</a>'+
    '<button onclick="KG_toggleReadModal()">'+(st==='completed'?'鈫?鏍囪鏈瀹?:'鉁?鏍囪宸插畬鎴?)+'</button>'+

function KG_renderTags(){
  var set = new Set();
  KG_BOOKS.forEach(function(b){ b.tags.forEach(function(t){set.add(t);}); });
  var all = Array.from(set).sort();
  if(KG.setTags) KG.setTags('__master__', all);
  var html = '<div class="stat-cards"><div class="stat-card"><div class="num">'+all.length+'</div><div class="lbl">鎬绘爣绛?/div></div></div><div style="display:flex;flex-wrap:wrap;gap:6px;">';
  all.forEach(function(tag){
    var cnt = KG_BOOKS.filter(function(b){return b.tags.includes(tag);}).length;
    html += '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;" onclick="document.getElementById(\'searchBox\').value=\''+tag+'\';KG_switchTab(\'books\')">'+
      '<div style="font-weight:600;font-size:0.85rem;">'+KG_tag(tag)+'</div><div style="font-size:0.7rem;color:var(--text2);">'+cnt+' 椤?/div></div>';
  });
  document.getElementById('tab-tags').innerHTML = html+'</div>';
}

function KG_renderGraph(){
  var nodes=[], links=[], edgeSet=new Set();
  KG_BOOKS.forEach(function(b){
    var sz = 15+((KG.getStats?KG.getStats(b.id).visits:0)||0)*3;
    var st = KG.getStatus?KG.getStatus(b.id):null;
    var cl = st==='completed'?'#3fb950':st==='reading'?'#d29922':'#58a6ff';
    nodes.push({id:b.id,name:b.title,symbolSize:Math.min(sz,40),itemStyle:{color:cl}});
    b.tags.forEach(function(t){
      var tid='tag_'+t;
      if(!nodes.find(function(n){return n.id===tid;})) nodes.push({id:tid,name:t,symbolSize:8,itemStyle:{color:'#8b949e'}});
      var key=b.id+'_'+tid;
      if(!edgeSet.has(key)){ edgeSet.add(key); links.push({source:b.id,target:tid,lineStyle:{color:'#30363d',width:1}}); }
    });
  });
  var dom=document.getElementById('kgraph');
  if(!dom) return;
  var chart=echarts.init(dom);
  chart.setOption({
    tooltip:{trigger:'item',formatter:function(p){if(p.dataType==='node') return'<b>'+p.name+'</b>';}},
    series:[{
      type:'graph',layout:'force',roam:true,draggable:true,
      data:nodes, links:links,
      force:{repulsion:400,edgeLength:120,friction:0.1},
      label:{show:true,position:'right',fontSize:10,color:'#e6edf3',formatter:function(p){return p.name.length>6?p.name.slice(0,6)+'...':p.name;}},
      emphasis:{focus:'adjacency',lineStyle:{width:2}},
      lineStyle:{color:'#30363d',curveness:0.3,opacity:0.5}
    }]
  });
  chart.on('click', function(p){ if(p.dataType==='node' && !p.id.startsWith('tag_')) KG_openModal(p.id); });
}

    html += '<h4 style="font-size:0.9rem;margin-bottom:8px;">馃敶 鍒版湡澶嶄範</h4>';

function KG_importBackup(e){
  var file = e.target.files[0];

  var reader = new FileReader();

    try{ KG.importAll(JSON.parse(ev.target.result)); alert('鉁?瀵煎叆鎴愬姛锛?); KG_renderStatsPanel(); KG_checkSRS(); }
    catch(err){ alert('鉂?瀵煎叆澶辫触锛氭枃浠舵牸寮忎笉姝ｇ‘'); }
  };
  reader.readAsText(file);
}
